services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-palp}
      POSTGRES_USER: ${POSTGRES_USER:-palp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-palp_dev_password}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-palp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: ./backend
    command: celery -A palp worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./backend
    command: celery -A palp beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend

  db-backup:
    image: postgres:16-alpine
    volumes:
      - ./backups:/backups
    env_file:
      - .env
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-palp}
      PGPASSWORD: ${POSTGRES_PASSWORD:-palp_dev_password}
      PGDATABASE: ${POSTGRES_DB:-palp}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          pg_dump -Fc > /backups/palp_$$TIMESTAMP.dump
          echo "[$$TIMESTAMP] Backup completed"
          ls -t /backups/palp_*.dump | tail -n +8 | xargs -r rm --
          sleep 21600
        done
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
