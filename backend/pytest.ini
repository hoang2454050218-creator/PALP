[pytest]
DJANGO_SETTINGS_MODULE = palp.settings.test
python_files = tests.py test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
    --no-header
    -q
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: integration tests requiring full stack
    contract: API contract/schema tests
    security: security and authorization tests
    idempotency: idempotency/retry behaviour tests
    load: load/performance tests
    data_qa: data quality assurance tests
    recovery: backup/restore/retry tests
testpaths = .
