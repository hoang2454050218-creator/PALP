        properties: {}
        session_id:
          type: string
          maxLength: 100
        device_type:
          type: string
          maxLength: 30
        source_page:
          type: string
          maxLength: 200
        timestamp_utc:
          type: string
          format: date-time
          readOnly: true
      required:
      - event_name
      - id
      - timestamp_utc
    EventNameEnum:
      enum:
      - session_started
      - session_ended
      - assessment_completed
      - micro_task_completed
      - content_intervention
      - retry_triggered
      - gv_dashboard_viewed
      - gv_action_taken
      - wellbeing_nudge
      - wellbeing_nudge_shown
      - wellbeing_nudge_accepted
      - wellbeing_nudge_dismissed
      - page_view
      type: string
      description: |-
        * `session_started` - Bắt đầu phiên
        * `session_ended` - Kết thúc phiên
        * `assessment_completed` - Hoàn thành assessment
        * `micro_task_completed` - Hoàn thành micro-task
        * `content_intervention` - Can thiệp nội dung
        * `retry_triggered` - Retry triggered
        * `gv_dashboard_viewed` - GV xem dashboard
        * `gv_action_taken` - GV thực hiện can thiệp
        * `wellbeing_nudge` - Nhắc nghỉ
        * `wellbeing_nudge_shown` - Hiện nhắc nghỉ
        * `wellbeing_nudge_accepted` - Chấp nhận nghỉ
        * `wellbeing_nudge_dismissed` - Bỏ qua nhắc nghỉ
        * `page_view` - Xem trang
    FollowUpStatusEnum:
      enum:
      - pending
      - student_responded
      - resolved
      - no_response
      type: string
      description: |-
        * `pending` - Chờ phản hồi
        * `student_responded` - SV đã phản hồi
        * `resolved` - Đã xử lý
        * `no_response` - Không phản hồi
    InterventionAction:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        alert:
          type: integer
        lecturer:
          type: integer
          readOnly: true
        lecturer_name:
          type: string
          readOnly: true
        action_type:
          $ref: '#/components/schemas/ActionTypeEnum'
        target_ids:
          type: array
          items:
            type: integer
          readOnly: true
        message:
          type: string
        context: {}
        follow_up_status:
          $ref: '#/components/schemas/FollowUpStatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action_type
      - alert
      - created_at
      - id
      - lecturer
      - lecturer_name
      - target_ids
      - updated_at
    InterventionTypeEnum:
      enum:
      - supplementary
      - difficulty_down
      - difficulty_up
      - retry_hint
      - recovery
