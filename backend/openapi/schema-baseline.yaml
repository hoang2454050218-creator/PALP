components:
  schemas:
    ActionTypeEnum:
      enum:
      - send_message
      - suggest_task
      - schedule_meeting
      type: string
      description: |-
        * `send_message` - Gửi tin nhắn
        * `suggest_task` - Gợi ý bài tập
        * `schedule_meeting` - Đặt lịch gặp
    Alert:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: integer
        student_name:
          type: string
          readOnly: true
        student_username:
          type: string
          readOnly: true
        student_class:
          type: integer
          nullable: true
        severity:
          $ref: '#/components/schemas/SeverityEnum'
        status:
          allOf:
          - $ref: '#/components/schemas/AlertStatusEnum'
          default: active
        trigger_type:
          $ref: '#/components/schemas/TriggerTypeEnum'
        concept:
          type: integer
          nullable: true
        concept_name:
          type: string
          readOnly: true
        milestone:
          type: integer
          nullable: true
        milestone_title:
          type: string
          readOnly: true
        reason:
          type: string
        evidence: {}
        suggested_action:
          type: string
        dismiss_reason_code:
          oneOf:
          - $ref: '#/components/schemas/DismissReasonCodeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        dismiss_note:
          type: string
        resolved_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - concept_name
      - created_at
      - id
      - milestone_title
      - reason
      - severity
      - student
      - student_name
      - student_username
      - trigger_type
    AlertStatusEnum:
      enum:
      - active
      - dismissed
      - resolved
      - expired
      type: string
      description: |-
        * `active` - Đang mở
        * `dismissed` - Đã bỏ qua
        * `resolved` - Đã xử lý
        * `expired` - Hết hạn
    Assessment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        course:
          type: integer
        title:
          type: string
          maxLength: 200
        description:
          type: string
        time_limit_minutes:
          type: integer
          maximum: 32767
          minimum: 0
        question_count:
          type: string
          readOnly: true
      required:
      - course
      - id
      - question_count
      - title
    AssessmentQuestion:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        concept:
          type: integer
        question_type:
          $ref: '#/components/schemas/QuestionTypeEnum'
        text:
          type: string
        options:
          description: List of answer options
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
        points:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - concept
      - id
      - text
    AssessmentResponse:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        question:
          type: integer
        answer: {}
        is_correct:
          type: boolean
          readOnly: true
        time_taken_seconds:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - answer
      - id
      - is_correct
      - question
    AssessmentSession:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        assessment:
          type: integer
        assessment_title:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/AssessmentSessionStatusEnum'
          readOnly: true
        version:
          type: integer
          readOnly: true
        started_at:
          type: string
          format: date-time
          readOnly: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        submitted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        total_score:
          type: number
          format: double
          readOnly: true
          nullable: true
        total_time_seconds:
          type: integer
          readOnly: true
          nullable: true
        responses:
          type: array
          items:
            $ref: '#/components/schemas/AssessmentResponse'
          readOnly: true
      required:
      - assessment
      - assessment_title
      - completed_at
      - id
      - responses
      - started_at
      - status
      - submitted_at
      - total_score
      - total_time_seconds
      - version
    AssessmentSessionStatusEnum:
      enum:
      - in_progress
      - completed
      - abandoned
      - expired
      type: string
      description: |-
        * `in_progress` - Đang làm
        * `completed` - Hoàn thành
        * `abandoned` - Bỏ dở
        * `expired` - Hết giờ
    BatchTrack:
      type: object
      properties:
        events:
          type: array
          items:
            type: object
            additionalProperties: {}
          maxItems: 500
          minItems: 1
      required:
      - events
    BlankEnum:
      enum:
      - ''
    Concept:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 30
        name:
          type: string
          maxLength: 200
        description:
          type: string
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
        prerequisite_ids:
          type: string
          readOnly: true
      required:
      - code
      - id
      - name
      - prerequisite_ids
    ContentIntervention:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        concept:
          type: integer
        concept_name:
          type: string
          readOnly: true
        intervention_type:
          $ref: '#/components/schemas/InterventionTypeEnum'
        source_rule:
          type: string
          maxLength: 100
        rule_version:
          type: string
          maxLength: 20
        p_mastery_at_trigger:
          type: number
          format: double
        mastery_before:
          type: number
          format: double
          nullable: true
        mastery_after:
          type: number
          format: double
          nullable: true
        explanation: {}
        was_helpful:
          type: boolean
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - concept
      - concept_name
      - created_at
      - id
      - intervention_type
      - p_mastery_at_trigger
      - source_rule
    ContentTypeEnum:
      enum:
      - text
      - image
      - video
      - example
      - formula
      type: string
      description: |-
        * `text` - Giải thích
        * `image` - Hình ảnh
        * `video` - Video
        * `example` - Ví dụ minh họa
        * `formula` - Công thức
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 20
        name:
          type: string
          maxLength: 200
        description:
          type: string
        credits:
          type: integer
          maximum: 32767
          minimum: 0
        concept_count:
          type: string
          readOnly: true
        milestone_count:
          type: string
          readOnly: true
      required:
      - code
      - concept_count
      - id
      - milestone_count
      - name
    CustomTokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    DataQualityLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        source:
          type: string
          maxLength: 100
        total_records:
          type: integer
          maximum: 2147483647
          minimum: 0
        missing_values:
          type: integer
          maximum: 2147483647
          minimum: 0
        outliers_detected:
          type: integer
          maximum: 2147483647
          minimum: 0
        records_cleaned:
          type: integer
          maximum: 2147483647
          minimum: 0
        quality_score:
          type: number
          format: double
        details: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - source
      - total_records
    DifficultyEnum:
      enum:
      - 1
      - 2
      - 3
      type: integer
      description: |-
        * `1` - Dễ
        * `2` - Trung bình
        * `3` - Khó
    DifficultyTargetEnum:
      enum:
      - 1
      - 2
      - 3
      type: integer
      description: |-
        * `1` - Dễ
        * `2` - Trung bình
        * `3` - Khó
    DismissReasonCodeEnum:
      enum:
      - false_positive
      - student_leave
      - resolved_offline
      - other
      type: string
      description: |-
        * `false_positive` - Báo nhầm
        * `student_leave` - SV nghỉ phép
        * `resolved_offline` - Xử lý ngoài hệ thống
        * `other` - Khác
    Enrollment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: integer
          readOnly: true
        course:
          allOf:
          - $ref: '#/components/schemas/Course'
          readOnly: true
        student_class:
          type: integer
          nullable: true
        semester:
          type: string
          maxLength: 10
        enrolled_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
