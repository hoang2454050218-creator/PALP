name: Deploy (blue-green)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        required: true
        options: [staging, production]
        default: staging
      image_tag:
        description: "Image tag to deploy (defaults to current SHA)"
        type: string
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: compute
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA::12}"; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ steps.compute.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ inputs.environment }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ steps.compute.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ inputs.environment }}

  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: build-push
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/palp
            export PALP_IMAGE_TAG="${{ needs.build-push.outputs.tag }}"
            echo "Deploying tag $PALP_IMAGE_TAG..."

            # Pull new images
            docker compose -f docker-compose.prod.yml pull backend frontend

            # Spin up green containers (suffix _v2)
            docker compose -f docker-compose.prod.yml -p palp-green up -d --no-deps backend frontend

            # Wait for healthchecks
            for i in {1..30}; do
              status=$(docker inspect --format='{{.State.Health.Status}}' palp-green_backend_1 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "Green is healthy"
                break
              fi
              sleep 2
            done

            # Switch nginx upstream
            sed -i 's|server backend:8000|server palp-green_backend_1:8000|' nginx/nginx.conf
            docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

            # Drain blue
            sleep 60
            docker compose -f docker-compose.prod.yml -p palp-blue down --remove-orphans || true

            # Promote green -> blue for next deploy
            docker compose -f docker-compose.prod.yml -p palp-blue up -d --no-deps backend frontend
            sed -i 's|server palp-green_backend_1:8000|server backend:8000|' nginx/nginx.conf
            docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

            echo "Deploy complete"

  smoke-test:
    name: Post-deploy smoke
    runs-on: ubuntu-latest
    needs: deploy
    # Default targets production. To override per environment (e.g. staging),
    # set the ``PALP_BASE_URL`` repository secret; the shell fallback below
    # uses the canonical hostname when the secret is empty/undefined.
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test
        env:
          BASE_URL: ${{ secrets.PALP_BASE_URL }}
        run: |
          : "${BASE_URL:=https://palp.dau.edu.vn}"
          export BASE_URL
          bash scripts/smoke_test.sh

      - name: Notify on failure
        if: failure()
        run: echo "::error::Smoke test failed -- consider rollback via scripts/rollback.sh"
