name: Lighthouse CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/lighthouse.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: /api

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          temporaryPublicStorage: true
          uploadArtifacts: true

      - name: Format & comment results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const path = require('path');
              const dir = '.lighthouseci';
              const files = fs.existsSync(dir) ? fs.readdirSync(dir).filter(f => f.endsWith('.json')) : [];
              const summaries = files.slice(0, 3).map(f => {
                const data = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf-8'));
                const cat = data.categories || {};
                return `### ${data.finalUrl || data.requestedUrl}\n` +
                  `- Performance: ${Math.round((cat.performance?.score || 0) * 100)}\n` +
                  `- Accessibility: ${Math.round((cat.accessibility?.score || 0) * 100)}\n` +
                  `- Best Practices: ${Math.round((cat['best-practices']?.score || 0) * 100)}\n` +
                  `- SEO: ${Math.round((cat.seo?.score || 0) * 100)}`;
              }).join('\n\n');
              if (summaries) {
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: context.issue.number,
                  body: `## Lighthouse CI\n\n${summaries}`,
                });
              }
            } catch (e) { console.log('Skipping LHCI comment:', e.message); }
