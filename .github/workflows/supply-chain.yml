name: Supply Chain Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 4 * * *"  # Daily 04:00 UTC

permissions:
  contents: read
  security-events: write
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          if [ "${{ matrix.target }}" = "backend" ]; then
            docker build -t palp-${{ matrix.target }}:scan ./backend
          else
            docker build -t palp-${{ matrix.target }}:scan -f ./frontend/Dockerfile.prod ./frontend
          fi

      - name: Trivy scan (HIGH + CRITICAL fail)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: palp-${{ matrix.target }}:scan
          format: sarif
          output: trivy-${{ matrix.target }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.target }}.sarif
          category: trivy-${{ matrix.target }}

  sbom:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          if [ "${{ matrix.target }}" = "backend" ]; then
            docker build -t palp-${{ matrix.target }}:sbom ./backend
          else
            docker build -t palp-${{ matrix.target }}:sbom -f ./frontend/Dockerfile.prod ./frontend
          fi

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: palp-${{ matrix.target }}:sbom
          format: cyclonedx-json
          output-file: sbom-${{ matrix.target }}.cyclonedx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.target }}
          path: sbom-${{ matrix.target }}.cyclonedx.json

  cosign-sign:
    runs-on: ubuntu-latest
    needs: [trivy, sbom]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      packages: write
    strategy:
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        id: build
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.target }}:${{ github.sha }}"
          if [ "${{ matrix.target }}" = "backend" ]; then
            docker build -t "$IMG" ./backend
          else
            docker build -t "$IMG" -f ./frontend/Dockerfile.prod ./frontend
          fi
          docker push "$IMG"
          echo "img=$IMG" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v3
      - name: Cosign keyless sign
        run: cosign sign --yes "${{ steps.build.outputs.img }}"

  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install detect-secrets
        run: pip install detect-secrets
      - name: Scan
        run: |
          detect-secrets scan --baseline .secrets.baseline 2>/dev/null || true
          detect-secrets audit --report --fail-on-unaudited --fail-on-live --fail-on-audited-real .secrets.baseline || (
            echo "::error::Unaudited / live secrets found. Run 'detect-secrets audit .secrets.baseline' locally."
            exit 1
          )

  semgrep:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/django
            p/jwt
            p/secrets
            p/typescript
            p/react
        env:
          SEMGREP_RULES: p/owasp-top-ten p/django
        continue-on-error: true

  zap-baseline:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    # The default below targets the canonical staging URL. To override per
    # environment, set the ``PALP_STAGING_URL`` repository secret; runners
    # picked up at scan time via the explicit env-fallback in the step.
    steps:
      - uses: actions/checkout@v4
      - name: ZAP baseline scan against staging
        env:
          STAGING_URL: ${{ secrets.PALP_STAGING_URL }}
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: ${{ env.STAGING_URL || 'https://staging.palp.dau.edu.vn' }}
          rules_file_name: .zap/rules.tsv
          fail_action: false
        continue-on-error: true
